<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale = 1">
    <title>Siddha Mehta</title>
    <link rel="stylesheet" text="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/cecd160009.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="hacker.png">
    <style>
        @import url("https://fonts.googleapis.com/css?family=Fira+Code:300,400|Share+Tech+Mono&display=swap");
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0d0d0d;
        }

        .terminal-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .terminal-window {
            width: 100%;
            max-width: 900px;
            height: auto;
            min-height: 500px;
            max-height: 85vh;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #e11d48;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.2);
            padding: 15px;
            font-family: 'Fira Code', monospace;
            color: #e11d48;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .terminal-header {
            border-bottom: 1px dashed #e11d48;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #aaaaaa;
            display: flex;
            justify-content: space-between;
        }
        
        .terminal-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        /* Hide scrollbar for a cleaner terminal look, but keep it scrollable */
        .terminal-content::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-content::-webkit-scrollbar-thumb {
            background: #e11d48;
            border-radius: 4px;
        }
        
        .terminal-line {
            margin-bottom: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #e11d48;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        #btext {
            min-height: 40vh; /* Ensure there is room to scroll to */
            padding-bottom: 50px;
        }

        
        @keyframes icon {
            0% {
                opacity: 0;
                transform: scale(0);
            }
            50% {
                opacity: 1;
                transform: scale(1.3) rotate(-2deg);
            }
            100% {
                opacity: 1;
                bottom: 0px;
            }
        }
    </style>
    <script>
        if (document.location.search.match(/type=embed/gi)) {
            window.parent.postMessage("resize", "*");
        }
        
        document.addEventListener("DOMContentLoaded", () => {
            function getRandomIp() {
                return `${Math.floor(Math.random() * 254) + 1}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 254) + 1}`;
            }
            
            const localIp = getRandomIp();
            const targetIp = getRandomIp();
            const sourcePort = Math.floor(Math.random() * (65535 - 1024 + 1)) + 1024;
            
            // Update terminal header dynamically
            document.getElementById("target-ip").innerText = targetIp;

            const sequence = [
                { text: "firelord@local:~$ nc -lvnp 1337", delay: 600, type: "input" },
                { text: "listening on [any] 1337 ...", delay: 800, type: "output" },
                { text: `connect to [${localIp}] from (UNKNOWN) [${targetIp}] ${sourcePort}`, delay: 600, type: "output" },
                { text: "bash: no job control in this shell", delay: 300, type: "output" },
                { text: "root@target:~# whoami", delay: 500, type: "input" },
                { text: "Siddha Mehta - Security Engineer", delay: 600, type: "output", glow: true },
                { text: "root@target:~# cat ./bio.txt", delay: 500, type: "input" },
                { text: "I am a Security Engineer at Amazon and a recent master's graduate from the University of Washington Bothell. Specializing in the intersection of DevOps and automation, my work focuses on scaling security assessments through tool-driven frameworks. When not defending infrastructure, I am often found competing in CTFs or building them, tinkering with my homelab, or exploring how AI can be weaponized and subsequently defended in modern security testing.", delay: 800, type: "output" },
                { text: "root@target:~# cat ./volunteer-work.txt", delay: 500, type: "input" },
                { text: "Community Contributions & Giving Back:<br>- I actively help the cybersec community by creating CTF challenges and learning materials.<br>- Volunteer CTF challenge creator for the Red Team Association and <a href='https://grayhats.club/' target='_blank' style='color:#00ff41;'>GrayHats</a>.", delay: 800, type: "output" },
                { text: "root@target:~# cat ./achievements.txt", delay: 500, type: "input" },
                { text: "Recent Achievements & Leadership:<br>• Team Captain of 2nd place PRCCDC winner<br>• Vice President of <a href='https://grayhats.club/' target='_blank' style='color:#00ff41;'>GrayHats Cybersecurity Club</a>", delay: 800, type: "output" },
                { text: "root@target:~# ls -la ./links", delay: 500, type: "input" },
                { text: "drwxr-xr-x 2 root root 4096 Apr 1 13:37 .<br>-rwxrwxrwx 1 root root  12K Apr 1 13:37 <a href='resume.pdf' target='_blank' style='color:#00ff41;'>resume.pdf</a><br>-rwxrwxrwx 1 root root  18K Apr 1 13:37 <a href='projects.html' style='color:#00ff41;'>projects.html</a>", delay: 800, type: "output" },
                { text: "root@target:~# cat ./contacts.txt", delay: 500, type: "input" },
                { text: "Socials & Direct Lines:<br><br>" +
                  "&nbsp;&nbsp;[<i class='fab fa-linkedin' style='color:#aaaaaa;'></i>] <a href='https://www.linkedin.com/in/siddha-mehta' target='_blank' style='color:#00ff41;'>LinkedIn</a><br>" + 
                  "&nbsp;&nbsp;[<i class='fab fa-github' style='color:#aaaaaa;'></i>] <a href='https://www.github.com/FiReLoRd44' target='_blank' style='color:#00ff41;'>GitHub</a><br>" + 
                  "&nbsp;&nbsp;[<i class='fas fa-envelope' style='color:#aaaaaa;'></i>] <a href='mailto:mehtasiddha@gmail.com' style='color:#00ff41;'>mehtasiddha@gmail.com</a><br>", delay: 800, type: "output" },
                { text: "root@target:~# ", delay: 500, type: "input_cursor" }
            ];

            const termContent = document.getElementById("term-content");
            const cursor = document.getElementById("term-cursor");
            let seqIndex = 0;

            function runSequence() {
                if (seqIndex >= sequence.length) return;

                const lineData = sequence[seqIndex];
                
                // If it's just the final prompt
                if (lineData.type === "input_cursor") {
                    const inlinePrompt = document.createElement("span");
                    inlinePrompt.innerHTML = lineData.text;
                    cursor.parentNode.insertBefore(inlinePrompt, cursor);
                    termContent.scrollTop = termContent.scrollHeight;
                    return;
                }
                
                const lineDiv = document.createElement("div");
                lineDiv.className = "terminal-line";
                if (lineData.glow) {
                    lineDiv.style.textShadow = "0 0 10px rgba(225,29,72,0.8)";
                    lineDiv.style.color = "#fff";
                }
                
                termContent.insertBefore(lineDiv, cursor.parentNode);
                termContent.scrollTop = termContent.scrollHeight;

                if (lineData.type === "input") {
                    let charIndex = 0;
                    lineDiv.textContent = "";
                    const typeInterval = setInterval(() => {
                        lineDiv.textContent += lineData.text[charIndex];
                        charIndex++;
                        if (charIndex >= lineData.text.length) {
                            clearInterval(typeInterval);
                            seqIndex++;
                            termContent.scrollTop = termContent.scrollHeight;
                            setTimeout(runSequence, lineData.delay);
                        }
                    }, 35); // typing speed
                } else {
                    lineDiv.innerHTML = lineData.text;
                    seqIndex++;
                    setTimeout(runSequence, lineData.delay);
                }
            }

            setTimeout(runSequence, 600);
        });
    </script>
</head>

<body translate="no">
    <div itemscope itemtype="http://schema.org/Person">
        <div class="terminal-wrapper">
            <div class="terminal-window">
                <div class="terminal-header">
                    <span>root@target:~</span>
                    <span id="target-ip"></span>
                </div>
                <div class="terminal-content" id="term-content">
                    <div><span class="terminal-cursor" id="term-cursor"></span></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
