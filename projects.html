<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale = 1">
    <title>Siddha Mehta</title>
    <link rel="stylesheet" text="text/css" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@100&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/cecd160009.js" crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="hacker.png">
    <style>
        @import url("https://fonts.googleapis.com/css?family=Fira+Code:300,400|Share+Tech+Mono&display=swap");
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html {
            scroll-behavior: smooth;
        }

        body {
            background-color: #0d0d0d;
        }

        .terminal-wrapper {
            width: 100%;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .terminal-window {
            width: 100%;
            max-width: 900px;
            height: auto;
            min-height: 500px;
            max-height: 85vh;
            background: rgba(10, 10, 10, 0.95);
            border: 1px solid #e11d48;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(225, 29, 72, 0.2);
            padding: 15px;
            font-family: 'Fira Code', monospace;
            color: #e11d48;
            font-size: 15px;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        
        .terminal-header {
            border-bottom: 1px dashed #e11d48;
            padding-bottom: 8px;
            margin-bottom: 15px;
            font-size: 12px;
            color: #aaaaaa;
            display: flex;
            justify-content: space-between;
        }
        
        .terminal-content {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .terminal-content::-webkit-scrollbar {
            width: 8px;
        }
        .terminal-content::-webkit-scrollbar-thumb {
            background: #e11d48;
            border-radius: 4px;
        }
        
        .terminal-line {
            margin-bottom: 8px;
            line-height: 1.4;
            word-wrap: break-word;
        }
        
        .terminal-cursor {
            display: inline-block;
            width: 8px;
            height: 15px;
            background-color: #e11d48;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
            margin-left: 5px;
        }

        strong {
            color: #00ff41; /* Techy Green */
        }
        
        em {
            color: #fff;
            font-style: normal;
            font-size: 0.9em;
            background: rgba(225, 29, 72, 0.2);
            padding: 2px 6px;
            border-radius: 4px;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
    <script>
        if (document.location.search.match(/type=embed/gi)) {
            window.parent.postMessage("resize", "*");
        }

        document.addEventListener("DOMContentLoaded", () => {
            function getRandomIp() {
                return `${Math.floor(Math.random() * 254) + 1}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 256)}.${Math.floor(Math.random() * 254) + 1}`;
            }

            const serverIp = getRandomIp();
            document.getElementById("server-ip").innerText = serverIp;

            const sequence = [
                { text: `firelord@local:~$ ssh guest@projects.siddha.me`, delay: 500, type: "input" },
                { text: "guest@projects.siddha.me's password: ", delay: 800, type: "input", hidden: true },
                { text: "Access granted. Welcome to the Projects Matrix.", delay: 500, type: "output" },
                { text: "guest@projects:~# ./load_projects.sh", delay: 500, type: "input" },
                { text: "Fetching module data...<br><br>" + 
                  "<span style='color:#00ff41;'>[+] Project Nexus</span> | <em>Coming Soon</em><br>A sneak peek - Nexus is an open-source framework that seeks to change the amount of time and level of effort required for exhaustive BLE security testing. Nexus dynamically fingerprints devices while mapping GATT profiles to known attack vectors. To achieve this, it uses an AI planner to execute context-aware fuzzing campaigns that adapt in real-time to over-the-air indicators.<br><br>" +
                  "<span style='color:#00ff41;'>[+] Smart Street Light System</span> | <em>IoT, ThingSpeak, Arduino</em><br>Led a group of 3 to design an energy-efficient street light system using LoRa communication. Developed code to sync statuses to Firebase.<br><br>" +
                  "<span style='color:#00ff41;'>[+] Smart Irrigation System</span> | <em>IoT, Machine Learning, Python</em><br>Led a group of 3 to design an algorithm aiming to minimize water wastage. Optimized algorithm to run on Raspberry Pi 3B+ (71% accuracy).<br><br>" +
                  "<span style='color:#00ff41;'>[+] Call Detail Record and IPDR Analysis</span> | <em>Machine Learning, Big Data, Python</em><br>Developed Python programs to create a pseudo dataset & generated interactive graphs forming an anomaly prediction algorithm for CDR/IPDR.<br><br>" },
                { text: "guest@projects:~# cat contacts.txt", delay: 500, type: "input" },
                { text: "<br>You can reach me securely at:<br><br>" +
                  "&nbsp;&nbsp;[<i class='fab fa-linkedin' style='color:#aaaaaa;'></i>] <a href='https://www.linkedin.com/in/siddha-mehta' target='_blank' style='color:#00ff41;'>LinkedIn</a><br>" + 
                  "&nbsp;&nbsp;[<i class='fab fa-github' style='color:#aaaaaa;'></i>] <a href='https://www.github.com/FiReLoRd44' target='_blank' style='color:#00ff41;'>GitHub</a><br>" + 
                  "&nbsp;&nbsp;[<i class='fas fa-envelope' style='color:#aaaaaa;'></i>] <a href='mailto:mehtasiddha@gmail.com' style='color:#00ff41;'>mehtasiddha@gmail.com</a><br><br>" +
                  "&nbsp;&nbsp;[<i class='fas fa-home' style='color:#aaaaaa;'></i>] <a href='index.html' style='color:#e11d48;'>cd /home/siddha</a>", delay: 800, type: "output" },
                { text: "guest@projects:~# ", delay: 500, type: "input_cursor" }
            ];

            const termContent = document.getElementById("term-content");
            const cursor = document.getElementById("term-cursor");
            let seqIndex = 0;

            function runSequence() {
                if (seqIndex >= sequence.length) return;

                const lineData = sequence[seqIndex];
                
                if (lineData.type === "input_cursor") {
                    const inlinePrompt = document.createElement("span");
                    inlinePrompt.innerHTML = lineData.text;
                    cursor.parentNode.insertBefore(inlinePrompt, cursor);
                    termContent.scrollTop = termContent.scrollHeight;
                    return;
                }
                
                const lineDiv = document.createElement("div");
                lineDiv.className = "terminal-line";
                termContent.insertBefore(lineDiv, cursor.parentNode);
                termContent.scrollTop = termContent.scrollHeight;

                if (lineData.type === "input") {
                    let charIndex = 0;
                    lineDiv.textContent = "";
                    const typeInterval = setInterval(() => {
                        const nextChar = lineData.text[charIndex];
                        lineDiv.textContent += (lineData.hidden && charIndex > 38) ? "*" : nextChar;
                        charIndex++;
                        if (charIndex >= lineData.text.length) {
                            clearInterval(typeInterval);
                            seqIndex++;
                            termContent.scrollTop = termContent.scrollHeight;
                            setTimeout(runSequence, lineData.delay);
                        }
                    }, 35);
                } else {
                    lineDiv.innerHTML = lineData.text;
                    seqIndex++;
                    setTimeout(runSequence, lineData.delay);
                }
            }

            setTimeout(runSequence, 600);
        });
    </script>
</head>

<body translate="no">
    <div itemscope itemtype="http://schema.org/Person">
        <div class="terminal-wrapper">
            <div class="terminal-window">
                <div class="terminal-header">
                    <span>guest@projects:~</span>
                    <span id="server-ip"></span>
                </div>
                <div class="terminal-content" id="term-content">
                    <div><span class="terminal-cursor" id="term-cursor"></span></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
